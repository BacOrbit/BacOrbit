<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #0d0d0d;
        color: white;
        min-height: 100vh;
    }

    header {
        text-align: center;
        padding: 30px;
        border-bottom: 1px solid #1aff66;
    }

    .logo {
        font-size: 40px;
        font-weight: bold;
        color: #1aff66;
    }

    .hero {
        text-align: center;
        padding: 80px 20px 50px;
    }

    .hero h1 {
        font-size: 48px;
        margin-bottom: 15px;
    }

    .hero p {
        color: #bdbdbd;
        font-size: 18px;
    }

    .branches {
        max-width: 1200px;
        margin: auto;
        padding: 30px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 25px;
    }

    .card {
        background: #161616;
        border: 2px solid #1aff66;
        border-radius: 20px;
        padding: 35px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 0 25px rgba(26, 255, 102, 0.5);
    }

    .card h2 {
        color: #1aff66;
        margin-bottom: 15px;
    }

    .card p {
        color: #cfcfcf;
    }

    footer {
        text-align: center;
        margin-top: 80px;
        padding: 25px;
        color: #888;
    }
</style>
