<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دروس اللغة الإنجليزية - BacOrbit</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#0d0d0d;
    color:#fff;
    overflow-x:hidden;
}

header{
    background:#111;
    border-bottom:2px solid #1aff66;
    padding:25px 20px;
    text-align:center;
    backdrop-filter:blur(8px);
}

.logo{
    color:#1aff66;
    font-size:38px;
    font-weight:bold;
    letter-spacing:2px;
}

.hero{
    max-width:1100px;
    margin:auto;
    padding:70px 20px 40px;
    text-align:center;
}

.hero h1{
    font-size:48px;
    color:#1aff66;
    margin-bottom:18px;
}

.hero p{
    color:#bfbfbf;
    font-size:19px;
    line-height:1.8;
}

.lessons{
    width:100%;
    max-width:1050px;
    margin:auto;
    padding:20px;
}

.lesson{
    background:#141414;
    border:2px solid #1aff66;
    border-radius:22px;
    overflow:hidden;
    margin-bottom:45px;
    box-shadow:0 12px 35px rgba(0,0,0,.45);
    transition:.35s;
}

.lesson:hover{
    transform:translateY(-6px);
    box-shadow:0 0 35px rgba(26,255,102,.25);
}

.lesson img{
    width:100%;
    display:block;
}

.back{
    display:block;
    width:280px;
    margin:50px auto;
    padding:16px;
    text-align:center;
    background:#1aff66;
    color:#000;
    text-decoration:none;
    border-radius:15px;
    font-weight:bold;
    font-size:18px;
    transition:.3s;
}

.back:hover{
    transform:scale(1.05);
}

footer{
    text-align:center;
    color:#888;
    padding:35px 20px;
    border-top:1px solid #222;
}

@media(max-width:768px){

.logo{
    font-size:32px;
}

.hero{
    padding:50px 15px 25px;
}

.hero h1{
    font-size:34px;
}

.hero p{
    font-size:17px;
}

.lesson{
    border-radius:16px;
    margin-bottom:30px;
}

.back{
    width:90%;
}

}

</style>

</head>

<body>

<header>
